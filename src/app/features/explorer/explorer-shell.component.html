<div class="explorer-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="user-avatar">{{ displayName.charAt(0).toUpperCase() }}</div>
      <div class="user-info">
        <span class="user-name">{{ displayName }}</span>
        <span class="user-host">{{ shortWebId }}</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="dashboard" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">&#9632;</span>
        Dashboard
      </a>
      <a routerLink="files" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">&#128193;</span>
        Files
      </a>
      <a routerLink="apps" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">&#9674;</span>
        Apps
      </a>
      <a routerLink="profile" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">&#9679;</span>
        Profile
      </a>
    </nav>

    <div class="sidebar-footer">
      <a routerLink="/" class="nav-item nav-home">
        <span class="nav-icon">&#8592;</span>
        Home
      </a>
      <button class="nav-item nav-logout" (click)="logout()">
        <span class="nav-icon">&#9211;</span>
        Sign out
      </button>
    </div>
  </aside>

  <main class="explorer-content">
    <router-outlet />
  </main>
</div>
