@if (errorService.error()) {
  <div class="error-banner" role="status" aria-live="polite">
    <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
      <circle cx="9" cy="9" r="8" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <line x1="9" y1="5" x2="9" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <circle cx="9" cy="13" r="1" fill="currentColor"/>
    </svg>
    <span>{{ errorService.error() }}</span>
    <button class="dismiss" (click)="errorService.clear()" aria-label="Dismiss error">
      <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
        <line x1="2" y1="2" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="2" x2="2" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
}
