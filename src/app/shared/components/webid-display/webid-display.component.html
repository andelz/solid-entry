<div class="webid-display">
  <code class="webid-code">{{ webId() }}</code>
  <button class="btn btn-ghost copy-btn" (click)="copy()" [attr.aria-label]="copied() ? 'Copied!' : 'Copy your web address'">
    @if (copied()) {
      <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><polyline points="2,8 6,12 14,4" fill="none" stroke="var(--color-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Copied!
    } @else {
      <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><rect x="5" y="1" width="9" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="5" width="9" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
      Copy
    }
  </button>
</div>
